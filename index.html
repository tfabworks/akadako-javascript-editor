<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AkaDako JavaScript Editor</title>
  <link rel="icon" href="https://699.jp/wp-content/themes/akadako/favicon.ico" />

  <!-- CodeMirror 5 (self-hosted) -->
  <link rel="stylesheet" href="vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="vendor/codemirror/addon/hint/show-hint.min.css" />
  <script src="vendor/codemirror/codemirror.min.js"></script>
  <script src="vendor/codemirror/mode/xml/xml.min.js"></script>
  <script src="vendor/codemirror/mode/javascript/javascript.min.js"></script>
  <script src="vendor/codemirror/mode/css/css.min.js"></script>
  <script src="vendor/codemirror/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="vendor/codemirror/addon/hint/show-hint.min.js"></script>
  <script src="vendor/codemirror/addon/edit/matchbrackets.min.js"></script>
  <script src="vendor/codemirror/addon/edit/closebrackets.min.js"></script>

  <style>
    :root {
      color-scheme: light;
      --accent: #1565c0;
      --accent-hover: #1976d2;
      /* 落ち着いた青系: 全体は淡いブルーグレー、ヘッダーは深い青。
         コーディング部分 (CodeMirror) のみ白背景のまま */
      --bg: #d9e4f0;
      --panel: #e9f1f8;
      --border: #b7c9dc;
      --text: #1f2d3d;
      --muted: #5a708a;
      --header-bg: #2e4d71;
      --header-border: #24405e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .75rem; background: var(--header-bg); border-bottom: 1px solid var(--header-border);
      overflow-x: auto;
    }
    header h1 { font-size: 1.15rem; margin: 0 .75rem 0 0; font-weight: 700; flex: none; color: #fff; }
    button {
      font: inherit; font-size: 1rem; padding: .45rem .9rem; border: 1px solid var(--border);
      background: #f7fafd; color: var(--text); border-radius: 6px; cursor: pointer;
      white-space: nowrap;
    }
    header button {
      flex: none;
      background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.3); color: #fff;
    }
    header button:hover:not(:disabled) { background: rgba(255,255,255,.24); }
    @media (max-width: 1400px) {
      header { gap: .35rem; padding: .5rem .5rem; }
      header h1 { font-size: 1rem; margin-right: .4rem; }
      header button { font-size: .9rem; padding: .35rem .6rem; }
    }
    /* 履歴の ◀ ▶ は細身にしてヘッダーの幅を節約する */
    #hist-back, #hist-fwd { padding-left: .55rem; padding-right: .55rem; }
    /* さらに狭い画面ではタイトルを隠してボタンを優先する */
    @media (max-width: 1100px) {
      header h1 { display: none; }
      header button { font-size: .85rem; padding: .3rem .5rem; }
      #save, #sample { margin-left: .6rem; }
    }
    button:hover:not(:disabled) { background: #e8f0f8; }
    button:disabled { opacity: .45; cursor: default; }
    #run, .primary { background: #1e88e5; border-color: #1e88e5; color: #fff; }
    #run:hover:not(:disabled), .primary:hover:not(:disabled) { background: #2196f3; }
    #stop { color: #ffc4bc; }
    #save { margin-left: 1.2rem; }     /* 実行系 と 保存系 の区切り */
    #sample { margin-left: 1.2rem; }   /* 保存系 と サンプル の区切り */
    /* ステータスは幅が足りない時に省略記号で縮み、横スクロールを防ぐ */
    #status {
      margin-left: auto; font-size: .95rem; flex: 0 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #status { color: #d7e3f0; }
    #status.ok { color: #a5e8b0; }
    #status.warn { color: #ffd88f; }
    #vibe {
      margin-left: .75rem;
      background: linear-gradient(135deg, #7c4dff, #e040fb); color: #fff;
      border: none; font-weight: 600;
    }
    #vibe:hover:not(:disabled) { filter: brightness(1.08); background: linear-gradient(135deg, #7c4dff, #e040fb); }

    /* 編集 / ページ 切り替えタブ */
    #viewswitch { display: inline-flex; flex: none; border: 1px solid rgba(255,255,255,.35); border-radius: 6px; overflow: hidden; margin-left: 1.2rem; }
    #viewswitch button { border: none; border-radius: 0; padding: .45rem .9rem; background: transparent; color: rgba(255,255,255,.75); }
    #viewswitch button:hover:not(:disabled) { background: rgba(255,255,255,.15); }
    #viewswitch button.active { background: #fff; color: var(--accent); font-weight: 600; }

    main {
      flex: 1; min-height: 0; display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: 1fr 200px;
    }
    #editorwrap { grid-column: 1; grid-row: 1; overflow: hidden; min-height: 0; background: #fff; }
    .CodeMirror { height: 100%; font-size: 15px; line-height: 1.55; }

    /* HTMLページ画面 (プレビュー) */
    #pagewrap {
      grid-column: 1; grid-row: 1; min-height: 0; position: relative;
      background: #fff; display: flex; flex-direction: column;
    }
    #pagebar {
      display: flex; align-items: center; gap: .5rem; padding: .3rem .6rem;
      background: #d9e5f2; border-bottom: 1px solid var(--border);
      font-size: .85rem; color: var(--muted);
    }
    #preview { flex: 1; width: 100%; border: none; background: #fff; }
    #pagewrap[hidden], #editorwrap[hidden] { display: none; }

    #console-wrap {
      grid-column: 1; grid-row: 2; position: relative; min-height: 0;
      display: flex; border-top: 1px solid var(--border);
    }
    #console {
      flex: 1; margin: 0; padding: .75rem 5rem .75rem .75rem; overflow: auto;
      white-space: pre-wrap; background: #f4f8fc;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13.5px; line-height: 1.5;
    }
    #console .err { color: #c62828; }
    #console .muted { color: #2e7d32; }
    /* 行番号つきエラーはクリックでエディタの該当行へ飛べる */
    #console .jump { cursor: pointer; text-decoration: underline dotted; }
    #console .jump:hover { background: #fdecec; }
    /* エラーが起きた行の印 */
    .CodeMirror .error-line { background: #ffe9e9; }
    #clear {
      position: absolute; top: .4rem; right: .6rem; z-index: 5;
      font-size: .85rem; padding: .25rem .6rem; opacity: .9;
    }

    /* 右パネル: センサーグラフ / リファレンス */
    aside#monitor {
      grid-column: 2; grid-row: 1 / span 2; min-height: 0;
      display: flex; flex-direction: column;
      background: var(--panel); border-left: 1px solid var(--border);
    }
    #tabs { display: flex; border-bottom: 1px solid var(--border); }
    #tabs .tab {
      flex: 1; font: inherit; font-size: 1rem; padding: .55rem .5rem; margin: 0;
      background: var(--panel); color: var(--muted); border: none; border-bottom: 2px solid transparent;
      border-radius: 0; cursor: pointer;
    }
    #tabs .tab:hover { background: #dbe7f3; }
    #tabs .tab.active { color: var(--accent); background: #cfe3f6; border-bottom-color: var(--accent); font-weight: 600; }
    #monitor-note {
      padding: .5rem .75rem; font-size: .85rem; color: #8a6d1a;
      background: #fff8e1; border-bottom: 1px solid #f0e3b2;
    }
    #monitor-note[hidden] { display: none; }
    #watchlist { overflow: auto; padding: .25rem 0; flex: 1; }
    .watch {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      gap: .25rem .5rem; padding: .45rem .75rem; border-bottom: 1px solid #d5e2ef;
    }
    .watch .name {
      font-size: 14px; color: #33475e;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .watch .val {
      font-family: ui-monospace, Menlo, monospace; font-size: 18px;
      color: #0b6e4f; font-weight: 700; justify-self: end;
    }
    .watch canvas { grid-column: 1 / span 2; width: 100%; height: 30px; }
    #monitor .empty { padding: .75rem; font-size: .95rem; color: var(--muted); line-height: 1.6; }
    #refview { overflow: auto; flex: 1; padding: .25rem .75rem 1rem; }
    #refview[hidden], #watchlist[hidden] { display: none; }
    #refview .rnote { font-size: .85rem; color: var(--muted); margin: .4rem 0 .2rem; line-height: 1.5; }
    #refview h4 { margin: .9rem 0 .25rem; font-size: .9rem; color: var(--accent); }
    #refview .ritem { padding: .35rem 0; border-bottom: 1px solid #d5e2ef; }
    #refview .rsig { display: block; font-family: ui-monospace, Menlo, monospace; font-size: .88rem; color: #6f42c1; }
    #refview .rdoc { font-size: .85rem; color: var(--muted); }
    .CodeMirror-hints { font-size: 14px; max-height: 22em; z-index: 60; }
    .CodeMirror-hint { padding: .15rem .6rem; }

    /* ダイアログ */
    .modal[hidden] { display: none; }
    .modal {
      position: fixed; inset: 0; z-index: 50; display: flex;
      align-items: center; justify-content: center; background: rgba(30, 40, 60, .35);
    }
    .modal-box {
      background: #fff; border: 1px solid var(--border); border-radius: 10px;
      min-width: 340px; max-width: 90vw; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.18);
    }
    .modal-box h3 { margin: 0; padding: .8rem 1rem; font-size: 1.1rem; border-bottom: 1px solid var(--border); }
    .modal-body { padding: 1rem; overflow: auto; font-size: 1rem; line-height: 1.7; }
    .modal-body input, .modal-body textarea {
      width: 100%; font: inherit; font-size: 1rem; padding: .5rem;
      background: #fff; color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    }
    .modal-body textarea { resize: vertical; min-height: 5.5em; line-height: 1.5; }
    /* Vibe Coding & Assist のモード切り替え（修正 / ゼロから / エラー相談 / コード相談） */
    .seg { display: inline-flex; flex-wrap: wrap; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: .7rem; }
    .seg button {
      border: none; border-radius: 0; padding: .5rem .8rem; background: #fff; color: var(--muted);
      font-size: .9rem; cursor: pointer; border-right: 1px solid var(--border);
    }
    .seg button:last-child { border-right: none; }
    .seg button:hover:not(.active) { background: #eef3f9; }
    .seg button.active { background: var(--accent); color: #fff; font-weight: 600; }
    .seg button:disabled { opacity: .4; cursor: not-allowed; }
    /* バイブコーディングの生成中スピナー */
    .vibe-spinner {
      display: inline-block; width: 1.15em; height: 1.15em; flex: none;
      border: 2px solid #cdd9e6; border-top-color: var(--accent);
      border-radius: 50%; animation: vibe-spin .8s linear infinite;
    }
    @keyframes vibe-spin { to { transform: rotate(360deg); } }
    .vibe-errbox { max-height: 40vh; overflow: auto; line-height: 1.6; }
    .vibe-errbox a { color: var(--accent); }
    /* 相談モードの回答表示 */
    .consult-q { color: var(--muted); font-size: .9rem; margin-bottom: .5rem; white-space: pre-wrap; }
    .consult-a {
      background: #f3f8f3; border: 1px solid var(--border); border-radius: 10px;
      padding: .7rem .9rem; white-space: pre-wrap; line-height: 1.7;
      max-width: 44rem; max-height: 45vh; overflow: auto;
    }
    /* エラー後にコンソール欄へ出す「AIに聞く」導線 */
    #console .ask-ai {
      display: inline-block; margin: .3rem 0 .4rem; padding: .3rem .8rem;
      font: inherit; font-size: .9rem; cursor: pointer;
      color: var(--accent); background: #fff;
      border: 1px solid var(--accent); border-radius: 999px;
    }
    #console .ask-ai:hover { background: #eef3f9; }
    .modal-actions { display: flex; justify-content: flex-end; gap: .5rem; padding: .75rem 1rem; border-top: 1px solid var(--border); }
    .prog-row { display: flex; align-items: center; gap: .5rem; padding: .45rem 0; border-bottom: 1px solid #d5e2ef; }
    .prog-row .pname { flex: 1; font-family: ui-monospace, Menlo, monospace; font-size: 1rem; word-break: break-all; }
    .prog-row button { font-size: .9rem; padding: .3rem .7rem; }
    /* 置き換え直後の「元に戻す」トースト */
    #toast {
      position: fixed; left: 50%; bottom: 1.2rem; transform: translateX(-50%);
      display: flex; align-items: center; gap: .8rem; z-index: 60;
      background: #1e3a5f; color: #fff; padding: .55rem .6rem .55rem 1rem;
      border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.3);
      font-size: .95rem; max-width: 90vw;
    }
    #toast[hidden] { display: none; }
    #toast button {
      font: inherit; font-size: .9rem; padding: .3rem .8rem; cursor: pointer;
      background: #fff; color: var(--accent); border: none; border-radius: 6px;
    }
    #toast button:hover { background: #eef3f9; }
  </style>
</head>
<body>
  <header>
    <h1>AkaDako JavaScript</h1>
    <button id="connect" title="ボードに接続">Connect</button>
    <button id="run" title="実行 (Ctrl+Enter)">Run ▶</button>
    <button id="stop" disabled title="停止">Stop ◼</button>
    <span id="viewswitch">
      <button id="view-edit" class="active" title="編集画面">Edit</button>
      <button id="view-page" title="HTMLページ画面">Page</button>
    </span>
    <button id="hist-back" disabled title="1つ前のコードに戻る（実行や生成のたびに自動で記録されます）">◀</button>
    <button id="hist-fwd" disabled title="1つ先のコードに進む">▶</button>
    <button id="save" title="保存">Save</button>
    <button id="open" title="開く">Open</button>
    <button id="download" title="今のコードをHTMLファイルとしてダウンロード（そのままブラウザで開ける作品ファイルになります）">Download</button>
    <button id="sample" title="サンプル：接続中の全センサーの値を表示するHTMLを作成">Sample</button>
    <span id="status" class="warn">未接続</span>
    <button id="vibe" title="Vibe Coding &amp; Assist：生成AIでプログラムを作成・エラーやコードの相談">Vibe/Assist ✨</button>
  </header>
  <main>
    <div id="editorwrap"><textarea id="editor" spellcheck="false"></textarea></div>
    <div id="pagewrap" hidden>
      <div id="pagebar">
        <span>HTMLページ画面 — WebMIDI 許可済み iframe で実行中</span>
      </div>
      <!-- AkaDako は WebMIDI を使うため、iframe に midi を許可する -->
      <iframe id="preview" allow="midi *" title="HTMLページ"></iframe>
    </div>
    <div id="console-wrap">
      <button id="clear">クリア</button>
      <pre id="console"></pre>
    </div>
    <aside id="monitor">
      <div id="tabs">
        <button id="tab-sensor" class="tab active">センサー</button>
        <button id="tab-ref" class="tab">リファレンス</button>
      </div>
      <div id="monitor-note" hidden>ページ実行中は、ボードをページ側が使うためモニターを一時停止しています。「Stop ◼」で再開します。</div>
      <div id="watchlist"><div class="empty">「Connect」でボードに接続すると、接続されているセンサーを自動で探して、見つかったセンサーをすべてここにグラフ表示します。</div></div>
      <div id="refview" hidden></div>
    </aside>
  </main>
  <div id="modal" class="modal" hidden>
    <div class="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-actions" class="modal-actions"></div>
    </div>
  </div>
  <div id="toast" hidden>
    <span id="toast-msg"></span>
    <button id="toast-btn"></button>
  </div>
  <input type="file" id="filein" accept=".html,.htm" hidden>

  <script src="akadako.js"></script>
  <script src="akadako-api.js"></script>
  <script src="main.js"></script>
</body>
</html>
